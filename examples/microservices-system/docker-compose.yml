version: '3.8'

services:
  api-gateway:
    image: kong:3.5.0
    container_name: ms_gateway
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8443:8443"
      - "8444:8444"
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: postgres
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: ${KONG_PG_PASSWORD}
      KONG_PG_DATABASE: kong
    depends_on:
      - postgres
      - auth-service
      - user-service
    networks:
      - public
      - services
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

  auth-service:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    container_name: ms_auth
    ports:
      - "50051:50051"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: auth_user
      DB_PASSWORD: ${AUTH_DB_PASSWORD}
      DB_NAME: auth_db
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - services
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=:50051"]
      interval: 20s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  user-service:
    build:
      context: ./services/user
      dockerfile: Dockerfile
    container_name: ms_user
    ports:
      - "50052:50052"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: user_service
      DB_PASSWORD: ${USER_DB_PASSWORD}
      DB_NAME: user_db
      AUTH_SERVICE_ADDR: auth-service:50051
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      nats:
        condition: service_started
    networks:
      - services
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=:50052"]
      interval: 20s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 768M
        reservations:
          cpus: '0.25'
          memory: 256M

  order-service:
    build:
      context: ./services/order
      dockerfile: Dockerfile
    container_name: ms_order
    ports:
      - "50053:50053"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: order_service
      DB_PASSWORD: ${ORDER_DB_PASSWORD}
      DB_NAME: order_db
      USER_SERVICE_ADDR: user-service:50052
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_healthy
      nats:
        condition: service_started
    networks:
      - services
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=:50053"]
      interval: 20s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 768M
        reservations:
          cpus: '0.25'
          memory: 256M

  notification-service:
    build:
      context: ./services/notification
      dockerfile: Dockerfile
    container_name: ms_notification
    environment:
      NATS_URL: nats://nats:4222
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
    depends_on:
      nats:
        condition: service_started
    networks:
      - services
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  postgres:
    image: postgres:16.1-alpine
    container_name: ms_postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_ROOT_PASSWORD}
    networks:
      - services
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 1G

  redis:
    image: redis:7.2.4-alpine
    container_name: ms_redis
    volumes:
      - redis_data:/data
    networks:
      - services
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  nats:
    image: nats:2.10.9-alpine
    container_name: ms_nats
    ports:
      - "4222:4222"
      - "8222:8222"
    command: "-js -m 8222"
    volumes:
      - nats_data:/data
    networks:
      - services
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nats", "server", "check", "health", "--server=nats://localhost:4222"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  elasticsearch:
    image: elasticsearch:8.11.3
    container_name: ms_es
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - xpack.security.enabled=false
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - services
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 6G
        reservations:
          cpus: '1.0'
          memory: 2G

  kibana:
    image: kibana:8.11.3
    container_name: ms_kibana
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - services
      - public
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

networks:
  public:
    driver: bridge
  services:
    driver: bridge

volumes:
  pg_data:
  redis_data:
  nats_data:
  es_data:
