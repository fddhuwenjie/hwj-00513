version: '3.8'

services:
  web:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_ENV: ${APP_ENV:-production}
      DB_HOST: postgres
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - web_data:/var/www/html
    networks:
      - frontend
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-appdb}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - backend
    restart: on-failure
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 2G

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - backend
      - monitoring
    ports:
      - "6379:6379"

  monitoring:
    image: prom/prometheus:v2.50.0
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - monitoring
    restart: unless-stopped

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true
  monitoring:
    driver: bridge

volumes:
  web_data:
  pg_data:
  redis_data:
