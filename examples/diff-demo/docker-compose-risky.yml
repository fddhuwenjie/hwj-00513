version: '3.8'

services:
  web:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
      - "8080:80"
      - "3306:3306"
    environment:
      APP_ENV: production
      DB_HOST: postgres
      DB_PASSWORD: SuperSecret123!
      ADMIN_API_KEY: sk-live-abc123
    volumes:
      - ./html:/usr/share/nginx/html
    networks:
      - frontend
      - backend
      - public
    restart: "no"

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-appdb}
    networks:
      - backend

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    environment:
      REDIS_PASSWORD: plaintext_password
    networks:
      - backend

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
  public:
    driver: bridge
